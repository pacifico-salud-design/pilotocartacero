<!DOCTYPE html>
<html lang="es">
<head>
  <base href="/pages/cartacero/" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carta 0 — Registro de Atención | Pacífico Salud</title>
  <link rel="stylesheet" href="../../fonts/roboto.css" />
  <link rel="stylesheet" href="../../tokens/global.css" />
  <link rel="stylesheet" href="../../tokens/pacifico.css" />
  <link rel="stylesheet" href="../../tokens/aliases.css" />
  <link rel="stylesheet" href="../../tokens/base.css" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <a href="#main" class="skip-link">Ir al contenido</a>

  <header class="header">
    <div class="header__container">
      <img src="../../assets/pacifico-logo.svg" alt="Pacífico Salud" class="header__logo" />
      <span class="header__title">Carta 0 — Red Propia</span>
    </div>
  </header>

  <main id="main" class="main">
    <div class="main__container">

      <div id="alertArea" class="alert-area" aria-live="polite"></div>

      <section class="form-card" aria-labelledby="formTitle">
        <header class="form-card__header">
          <h1 class="form-card__title" id="formTitle">Registro de Atención</h1>
          <p class="form-card__subtitle">Complete los campos para registrar una nueva atención en Red Propia.</p>
        </header>

        <form id="atencionForm" class="form" novalidate>

          <!-- Row 1: Prestador + Compañía -->
          <div class="form__row">
            <div class="form__field">
              <label class="form__label" for="prestador">
                Prestador <span class="form__required" aria-hidden="true">*</span>
              </label>
              <div class="form__select-wrapper">
                <select id="prestador" name="prestador" class="form__select" required aria-required="true">
                  <option value="">Seleccionar...</option>
                  <option value="San Felipe">San Felipe</option>
                  <option value="Sanna El Golf">Sanna El Golf</option>
                  <option value="CC Miraflores">CC Miraflores</option>
                  <option value="CC San Miguel">CC San Miguel</option>
                </select>
              </div>
            </div>

            <div class="form__field">
              <label class="form__label" for="compania">
                Compañía <span class="form__required" aria-hidden="true">*</span>
              </label>
              <div class="form__select-wrapper">
                <select id="compania" name="compania" class="form__select" required aria-required="true">
                  <option value="">Seleccionar...</option>
                  <option value="EPS">EPS</option>
                  <option value="AMED">AMED</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Row 2: Póliza (disabled) + Beneficio -->
          <div class="form__row">
            <!--
              PÓLIZA: currently disabled.
              To enable: remove the `disabled` and `aria-disabled` attributes,
              remove the `form__field--disabled` class,
              and uncomment the `poliza` line in form.js handleSubmit().
            -->
            <div class="form__field form__field--disabled">
              <label class="form__label" for="poliza">Póliza / Código de Afiliado</label>
              <input
                type="text"
                id="poliza"
                name="poliza"
                class="form__input"
                placeholder="No disponible aún"
                disabled
                aria-disabled="true"
              />
              <span class="form__helper">Campo temporalmente deshabilitado.</span>
            </div>

            <div class="form__field">
              <label class="form__label" for="beneficio">
                Beneficio <span class="form__required" aria-hidden="true">*</span>
              </label>
              <div class="form__select-wrapper">
                <select id="beneficio" name="beneficio" class="form__select" required aria-required="true">
                  <option value="">Seleccionar...</option>
                  <option value="Ambulatorio">Ambulatorio</option>
                  <option value="Hospitalario">Hospitalario</option>
                  <option value="Chequeo preventivo">Chequeo preventivo</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Row 3: Solicitud por — only shown when Prestador = San Felipe -->
          <div id="solicitudPorRow" class="form__row form__row--hidden" aria-hidden="true">
            <div class="form__field">
              <label class="form__label" for="solicitudPor">
                Solicitud por <span class="form__required" aria-hidden="true">*</span>
              </label>
              <div class="form__select-wrapper">
                <select id="solicitudPor" name="solicitudPor" class="form__select" aria-required="false">
                  <option value="">Seleccionar...</option>
                  <option value="Cirugía">Cirugía</option>
                  <option value="Tratamiento médico">Tratamiento médico</option>
                  <option value="Hospitalización">Hospitalización</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Row 4: Prestación -->
          <div class="form__row">
            <div class="form__field form__field--full">
              <label class="form__label" for="prestacion">
                Prestación <span class="form__required" aria-hidden="true">*</span>
              </label>
              <textarea
                id="prestacion"
                name="prestacion"
                class="form__textarea"
                rows="3"
                placeholder="Ej: Colonoscopia, Endoscopia, Tomografía..."
                required
                aria-required="true"
              ></textarea>
            </div>
          </div>

          <!-- Row 5: CIE10 code + description -->
          <div class="form__row">
            <div class="form__field">
              <label class="form__label" for="cie10">
                CIE10 <span class="form__required" aria-hidden="true">*</span>
              </label>
              <input
                type="text"
                id="cie10"
                name="cie10"
                class="form__input"
                placeholder="Ej: A00, J45.0..."
                list="cie10List"
                required
                aria-required="true"
                autocomplete="off"
              />
              <datalist id="cie10List"></datalist>
            </div>

            <div class="form__field">
              <label class="form__label" for="cie10Desc">Descripción CIE10</label>
              <input
                type="text"
                id="cie10Desc"
                name="cie10Desc"
                class="form__input"
                placeholder="Se completa automáticamente"
                autocomplete="off"
              />
            </div>
          </div>

          <!-- Row 6: Monto + Fecha -->
          <div class="form__row">
            <div class="form__field">
              <label class="form__label" for="monto">
                Monto incluido IGV (S/) <span class="form__required" aria-hidden="true">*</span>
              </label>
              <input
                type="number"
                id="monto"
                name="monto"
                class="form__input"
                placeholder="0.00"
                step="0.01"
                min="0.01"
                required
                aria-required="true"
              />
            </div>

            <div class="form__field">
              <label class="form__label" for="fechaAtencion">
                Fecha y Hora de Atención <span class="form__required" aria-hidden="true">*</span>
              </label>
              <input
                type="datetime-local"
                id="fechaAtencion"
                name="fechaAtencion"
                class="form__input"
                required
                aria-required="true"
              />
            </div>
          </div>

          <!-- Actions -->
          <div class="form__actions">
            <button type="button" id="btnReset" class="btn btn--ghost">Limpiar</button>
            <button type="submit" id="btnSubmit" class="btn btn--primary">
              <span class="btn__text">Registrar Atención</span>
              <span class="btn__spinner" aria-hidden="true"></span>
            </button>
          </div>

        </form>
      </section>

    </div>
  </main>

  <script src="cie10-data.js"></script>
  <script src="form.js"></script>
</body>
</html>
