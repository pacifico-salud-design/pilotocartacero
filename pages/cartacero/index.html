<!DOCTYPE html>
<html lang="es">
<head>
  <base href="/pages/cartacero/" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carta 0 — Registro de Atención | Pacífico Salud</title>
  <link rel="stylesheet" href="../../fonts/roboto.css" />
  <link rel="stylesheet" href="../../tokens/global.css" />
  <link rel="stylesheet" href="../../tokens/pacifico.css" />
  <link rel="stylesheet" href="../../tokens/aliases.css" />
  <link rel="stylesheet" href="../../tokens/base.css" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <a href="#main" class="skip-link">Ir al contenido</a>

  <header class="header">
    <div class="header__container">
      <img src="../../assets/pacifico-logo.svg" alt="Pacífico Salud" class="header__logo" />
      <span class="header__title">Carta 0 — Red Propia</span>
    </div>
  </header>

  <main id="main" class="main">
    <div class="main__container">

      <div id="alertArea" class="alert-area" aria-live="polite"></div>

      <section class="form-card" aria-labelledby="formTitle">
        <header class="form-card__header">
          <h1 class="form-card__title" id="formTitle">Registro de Atención</h1>
          <p class="form-card__subtitle">Complete los campos para registrar una nueva atención en Red Propia.</p>
        </header>

        <form id="atencionForm" class="form" novalidate>

          <!-- Row 1: Prestador + Compañía -->
          <div class="form__row">
            <div class="text-field">
              <label class="text-field__label" for="prestador">
                Prestador <span class="text-field__required" aria-hidden="true">*</span>
              </label>
              <div class="text-field__container text-field__container--select">
                <select id="prestador" name="prestador" class="text-field__input text-field__select" required aria-required="true">
                  <option value="">Seleccionar...</option>
                  <option value="San Felipe">San Felipe</option>
                  <option value="Sanna El Golf">Sanna El Golf</option>
                  <option value="CC Miraflores">CC Miraflores</option>
                  <option value="CC San Miguel">CC San Miguel</option>
                </select>
              </div>
            </div>

            <div class="text-field">
              <label class="text-field__label" for="compania">
                Compañía <span class="text-field__required" aria-hidden="true">*</span>
              </label>
              <div class="text-field__container text-field__container--select">
                <select id="compania" name="compania" class="text-field__input text-field__select" required aria-required="true">
                  <option value="">Seleccionar...</option>
                  <option value="EPS">EPS</option>
                  <option value="AMED">AMED</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Row 2: Póliza (disabled) + Beneficio -->
          <div class="form__row">
            <!--
              PÓLIZA: currently disabled.
              To enable: remove `text-field--disabled` class and the `disabled` / `aria-disabled` attributes,
              and uncomment the `poliza` line in form.js handleSubmit() and functions/api/register.js.
            -->
            <div class="text-field text-field--disabled">
              <label class="text-field__label" for="poliza">Póliza / Código de Afiliado</label>
              <div class="text-field__container">
                <input
                  type="text"
                  id="poliza"
                  name="poliza"
                  class="text-field__input"
                  placeholder="No disponible aún"
                  disabled
                  aria-disabled="true"
                />
              </div>
              <span class="text-field__helper">Campo temporalmente deshabilitado.</span>
            </div>

            <div class="text-field">
              <label class="text-field__label" for="beneficio">
                Beneficio <span class="text-field__required" aria-hidden="true">*</span>
              </label>
              <div class="text-field__container text-field__container--select">
                <select id="beneficio" name="beneficio" class="text-field__input text-field__select" required aria-required="true">
                  <option value="">Seleccionar...</option>
                  <option value="Ambulatorio">Ambulatorio</option>
                  <option value="Hospitalario">Hospitalario</option>
                  <option value="Chequeo preventivo">Chequeo preventivo</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Row 3: Solicitud por — only shown when Prestador = San Felipe -->
          <div id="solicitudPorRow" class="form__row form__row--hidden" aria-hidden="true">
            <div class="text-field">
              <label class="text-field__label" for="solicitudPor">
                Solicitud por <span class="text-field__required" aria-hidden="true">*</span>
              </label>
              <div class="text-field__container text-field__container--select">
                <select id="solicitudPor" name="solicitudPor" class="text-field__input text-field__select" aria-required="false">
                  <option value="">Seleccionar...</option>
                  <option value="Cirugía">Cirugía</option>
                  <option value="Tratamiento médico">Tratamiento médico</option>
                  <option value="Hospitalización">Hospitalización</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Row 4: Prestación -->
          <div class="form__row">
            <div class="text-field text-field--full">
              <label class="text-field__label" for="prestacion">
                Prestación <span class="text-field__required" aria-hidden="true">*</span>
              </label>
              <div class="text-field__container text-field__container--textarea">
                <textarea
                  id="prestacion"
                  name="prestacion"
                  class="text-field__input text-field__textarea"
                  rows="3"
                  placeholder="Ej: Colonoscopia, Endoscopia, Tomografía..."
                  required
                  aria-required="true"
                ></textarea>
              </div>
            </div>
          </div>

          <!-- Row 5: CIE10 code + description -->
          <div class="form__row">
            <div class="text-field">
              <label class="text-field__label" for="cie10">
                CIE10 <span class="text-field__required" aria-hidden="true">*</span>
              </label>
              <div class="text-field__container">
                <input
                  type="text"
                  id="cie10"
                  name="cie10"
                  class="text-field__input"
                  placeholder="Ej: A00, J45.0..."
                  list="cie10List"
                  required
                  aria-required="true"
                  autocomplete="off"
                />
                <datalist id="cie10List"></datalist>
              </div>
            </div>

            <div class="text-field">
              <label class="text-field__label" for="cie10Desc">Descripción CIE10</label>
              <div class="text-field__container">
                <input
                  type="text"
                  id="cie10Desc"
                  name="cie10Desc"
                  class="text-field__input"
                  placeholder="Se completa automáticamente"
                  autocomplete="off"
                />
              </div>
            </div>
          </div>

          <!-- Row 6: Monto + Fecha -->
          <div class="form__row">
            <div class="text-field">
              <label class="text-field__label" for="monto">
                Monto incluido IGV (S/) <span class="text-field__required" aria-hidden="true">*</span>
              </label>
              <div class="text-field__container">
                <input
                  type="number"
                  id="monto"
                  name="monto"
                  class="text-field__input"
                  placeholder="0.00"
                  step="0.01"
                  min="0.01"
                  required
                  aria-required="true"
                />
              </div>
            </div>

            <div class="text-field">
              <label class="text-field__label" for="fechaAtencion">
                Fecha y Hora de Atención <span class="text-field__required" aria-hidden="true">*</span>
              </label>
              <div class="text-field__container">
                <input
                  type="datetime-local"
                  id="fechaAtencion"
                  name="fechaAtencion"
                  class="text-field__input"
                  required
                  aria-required="true"
                />
              </div>
            </div>
          </div>

          <!-- Actions -->
          <div class="form__actions">
            <button type="button" id="btnReset" class="btn btn--secondary">
              <span class="btn__label">Limpiar</span>
            </button>
            <button type="submit" id="btnSubmit" class="btn btn--primary">
              <span class="btn__label">Registrar Atención</span>
              <span class="btn__dots" aria-hidden="true">
                <span class="btn__dot"></span>
                <span class="btn__dot"></span>
                <span class="btn__dot"></span>
              </span>
            </button>
          </div>

        </form>
      </section>

    </div>
  </main>

  <script src="cie10-data.js"></script>
  <script src="form.js"></script>
</body>
</html>
