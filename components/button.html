<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design System — Button</title>

    <!-- Font + Token layer: font → global → brand → aliases → base -->
    <link rel="stylesheet" href="../fonts/roboto.css" />
    <link rel="stylesheet" href="../tokens/global.css" />
    <link rel="stylesheet" href="../tokens/pacifico.css" />
    <link rel="stylesheet" href="../tokens/aliases.css" />
    <link rel="stylesheet" href="../tokens/base.css" />

    <!-- Shared showcase + component styles -->
    <link rel="stylesheet" href="showcase.css" />
    <link rel="stylesheet" href="button.css" />
  </head>
  <body>
    <main class="showcase">

      <header class="showcase__header">
        <h1 class="showcase__title">Button</h1>
        <p class="showcase__subtitle">All variants × all states</p>
      </header>

      <!-- ================================================================
           STATE GRID — columns: label | Default | Hover | Pressed | Disabled | Loading
           ================================================================ -->

      <!-- Column headers -->
      <div class="btn-grid" role="presentation" aria-hidden="true">
        <span class="btn-grid__col-header"></span>
        <span class="btn-grid__col-header">Default</span>
        <span class="btn-grid__col-header">Hover</span>
        <span class="btn-grid__col-header">Pressed</span>
        <span class="btn-grid__col-header">Disabled</span>
        <span class="btn-grid__col-header">Loading</span>
      </div>

      <!-- ── VARIANT: Primary ── -->
      <div class="btn-grid">
        <span class="btn-grid__row-label">Primary</span>

        <div class="btn-grid__cell">
          <button class="btn btn--primary" type="button">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--primary is-hover" type="button" tabindex="-1">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--primary is-pressed" type="button" tabindex="-1">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--primary" type="button" disabled>
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--primary btn--loading" type="button" aria-label="Loading">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>
      </div>

      <!-- ── VARIANT: Secondary ── -->
      <div class="btn-grid">
        <span class="btn-grid__row-label">Secondary</span>

        <div class="btn-grid__cell">
          <button class="btn btn--secondary" type="button">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--secondary is-hover" type="button" tabindex="-1">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--secondary is-pressed" type="button" tabindex="-1">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--secondary" type="button" disabled>
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--secondary btn--loading" type="button" aria-label="Loading">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>
      </div>

      <!-- ── VARIANT: Ghost ── -->
      <div class="btn-grid">
        <span class="btn-grid__row-label">Ghost</span>

        <div class="btn-grid__cell">
          <button class="btn btn--ghost" type="button">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--ghost is-hover" type="button" tabindex="-1">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--ghost is-pressed" type="button" tabindex="-1">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--ghost" type="button" disabled>
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--ghost btn--loading" type="button" aria-label="Loading">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>
      </div>

      <!-- ── VARIANT: Danger ── -->
      <div class="btn-grid">
        <span class="btn-grid__row-label">Danger</span>

        <div class="btn-grid__cell">
          <button class="btn btn--danger" type="button">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--danger is-hover" type="button" tabindex="-1">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--danger is-pressed" type="button" tabindex="-1">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--danger" type="button" disabled>
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>

        <div class="btn-grid__cell">
          <button class="btn btn--danger btn--loading" type="button" aria-label="Loading">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true">
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
              <span class="btn__dot"></span>
            </span>
          </button>
        </div>
      </div>

      <!-- ================================================================
           NEGATIVE VARIANTS (on dark background)
           ================================================================ -->

      <header class="showcase__header">
        <h2 class="showcase__title" style="font-size: var(--font-size-l);">Negative (on dark)</h2>
        <p class="showcase__subtitle">Primary, Secondary, Ghost on dark surface</p>
      </header>

      <div class="btn-grid btn-grid--dark" role="presentation" aria-hidden="true">
        <span class="btn-grid__col-header"></span>
        <span class="btn-grid__col-header">Default</span>
        <span class="btn-grid__col-header">Hover</span>
        <span class="btn-grid__col-header">Pressed</span>
        <span class="btn-grid__col-header">Disabled</span>
        <span class="btn-grid__col-header">Loading</span>
      </div>

      <!-- Primary Negative -->
      <div class="btn-grid btn-grid--dark">
        <span class="btn-grid__row-label">Primary</span>

        <div class="btn-grid__cell">
          <button class="btn btn--primary btn--negative" type="button">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true"><span class="btn__dot"></span><span class="btn__dot"></span><span class="btn__dot"></span></span>
          </button>
        </div>
        <div class="btn-grid__cell">
          <button class="btn btn--primary btn--negative is-hover" type="button" tabindex="-1">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true"><span class="btn__dot"></span><span class="btn__dot"></span><span class="btn__dot"></span></span>
          </button>
        </div>
        <div class="btn-grid__cell">
          <button class="btn btn--primary btn--negative is-pressed" type="button" tabindex="-1">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true"><span class="btn__dot"></span><span class="btn__dot"></span><span class="btn__dot"></span></span>
          </button>
        </div>
        <div class="btn-grid__cell">
          <button class="btn btn--primary btn--negative" type="button" disabled>
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true"><span class="btn__dot"></span><span class="btn__dot"></span><span class="btn__dot"></span></span>
          </button>
        </div>
        <div class="btn-grid__cell">
          <button class="btn btn--primary btn--negative btn--loading" type="button" aria-label="Loading">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true"><span class="btn__dot"></span><span class="btn__dot"></span><span class="btn__dot"></span></span>
          </button>
        </div>
      </div>

      <!-- Secondary Negative -->
      <div class="btn-grid btn-grid--dark">
        <span class="btn-grid__row-label">Secondary</span>

        <div class="btn-grid__cell">
          <button class="btn btn--secondary btn--negative" type="button">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true"><span class="btn__dot"></span><span class="btn__dot"></span><span class="btn__dot"></span></span>
          </button>
        </div>
        <div class="btn-grid__cell">
          <button class="btn btn--secondary btn--negative is-hover" type="button" tabindex="-1">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true"><span class="btn__dot"></span><span class="btn__dot"></span><span class="btn__dot"></span></span>
          </button>
        </div>
        <div class="btn-grid__cell">
          <button class="btn btn--secondary btn--negative is-pressed" type="button" tabindex="-1">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true"><span class="btn__dot"></span><span class="btn__dot"></span><span class="btn__dot"></span></span>
          </button>
        </div>
        <div class="btn-grid__cell">
          <button class="btn btn--secondary btn--negative" type="button" disabled>
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true"><span class="btn__dot"></span><span class="btn__dot"></span><span class="btn__dot"></span></span>
          </button>
        </div>
        <div class="btn-grid__cell">
          <button class="btn btn--secondary btn--negative btn--loading" type="button" aria-label="Loading">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true"><span class="btn__dot"></span><span class="btn__dot"></span><span class="btn__dot"></span></span>
          </button>
        </div>
      </div>

      <!-- Ghost Negative -->
      <div class="btn-grid btn-grid--dark">
        <span class="btn-grid__row-label">Ghost</span>

        <div class="btn-grid__cell">
          <button class="btn btn--ghost btn--negative" type="button">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true"><span class="btn__dot"></span><span class="btn__dot"></span><span class="btn__dot"></span></span>
          </button>
        </div>
        <div class="btn-grid__cell">
          <button class="btn btn--ghost btn--negative is-hover" type="button" tabindex="-1">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true"><span class="btn__dot"></span><span class="btn__dot"></span><span class="btn__dot"></span></span>
          </button>
        </div>
        <div class="btn-grid__cell">
          <button class="btn btn--ghost btn--negative is-pressed" type="button" tabindex="-1">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true"><span class="btn__dot"></span><span class="btn__dot"></span><span class="btn__dot"></span></span>
          </button>
        </div>
        <div class="btn-grid__cell">
          <button class="btn btn--ghost btn--negative" type="button" disabled>
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true"><span class="btn__dot"></span><span class="btn__dot"></span><span class="btn__dot"></span></span>
          </button>
        </div>
        <div class="btn-grid__cell">
          <button class="btn btn--ghost btn--negative btn--loading" type="button" aria-label="Loading">
            <span class="btn__label">Button</span>
            <span class="btn__dots" aria-hidden="true"><span class="btn__dot"></span><span class="btn__dot"></span><span class="btn__dot"></span></span>
          </button>
        </div>
      </div>

    </main>
  </body>
</html>
