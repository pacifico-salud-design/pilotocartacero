# Cloudflare Pages configuration
# "pages_build_output_dir" tells wrangler deploy to use Pages mode (not Workers).
# This automatically excludes .git/, picks up the functions/ directory as
# Pages Functions, and applies the _redirects file.
#
# Environment variables must be set in the Cloudflare dashboard:
#   Settings → Environment Variables (Production)
#     SUPABASE_URL         https://arlrvlqqozajturbjtvj.supabase.co
#     SUPABASE_SERVICE_KEY  your service_role key (from Supabase → Settings → API)
#     ADMIN_PASSWORD        your back office password
#     JWT_SECRET            random string ≥ 32 chars (openssl rand -base64 32)

name                   = "pilotocartacero"
pages_build_output_dir = "."
compatibility_date     = "2025-09-27"
compatibility_flags    = ["nodejs_compat"]
